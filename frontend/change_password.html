<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>修改密码 - 通用报修系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="header">
    <a href="javascript:history.back()" class="header-back">← 返回</a>
    <h1>修改密码</h1>
  </div>

  <div class="container" style="padding-top: 20px;">
    <form id="passwordForm">
      <div class="card">
        <div class="form-group">
          <label class="form-label required">原密码</label>
          <input type="password" id="oldPassword" class="form-input" placeholder="请输入原密码" required>
        </div>

        <div class="form-group">
          <label class="form-label required">新密码</label>
          <input type="password" id="newPassword" class="form-input" placeholder="请输入新密码（至少6位）" required minlength="6">
        </div>

        <div class="form-group">
          <label class="form-label required">确认新密码</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="请再次输入新密码" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" style="margin-bottom: 20px;">确认修改</button>
    </form>
  </div>

  <script src="js/app.js"></script>
  <script>
    checkAuth();

    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!oldPassword) {
        Utils.showToast('请输入原密码');
        return;
      }
      if (!newPassword) {
        Utils.showToast('请输入新密码');
        return;
      }
      if (newPassword.length < 6) {
        Utils.showToast('新密码至少6位');
        return;
      }
      if (newPassword !== confirmPassword) {
        Utils.showToast('两次输入的新密码不一致');
        return;
      }

      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = '修改中...';

      try {
        await Utils.changePassword(oldPassword, newPassword);
        Utils.showToast('密码修改成功！');
        setTimeout(() => {
          history.back();
        }, 1000);
      } catch (err) {
        Utils.showToast(err.message || '修改失败');
        submitBtn.disabled = false;
        submitBtn.textContent = '确认修改';
      }
    });
  </script>
</body>
</html>
